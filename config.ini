# Configuration for the TradingView webhook listener and Binance trader.
# Edit the values below; blank values mean "disabled" or "use default".

[webhook]
# Shared secret that every TradingView alert must include.
secret = CHANGE_ME_SECRET
# Port the listener binds to.
port = 5000
# CSV file alerts are recorded into.
csv_path = alerts.csv

[binance]
# API credentials. Leave blank to disable trading (alerts are still recorded).
api_key = 
api_secret = 
# true  -> Binance Futures testnet (safe, fake funds)
# false -> LIVE real-money trading
testnet = true
# How `quantity` is interpreted:
#   usdt  -> spend this many USDT of notional (converted to token size at the
#            current price when the order is placed)
#   token -> this many units of the base asset (e.g. BTC)
quantity_type = usdt
# Fixed order size. With quantity_type = usdt this is in USDT (must meet the
# symbol's minimum notional, e.g. 100); with token this is the base asset, e.g. 0.001.
quantity = 500
# Optional leverage to set per symbol, e.g. 5. Blank = leave account default.
leverage = 1

# --- Position-management rules (all optional; blank = off) ---
# Take-profit distance in percent, e.g. 1.0
take_profit_pct = 5
# Stop-loss distance in percent, e.g. 0.5
stop_loss_pct = 10
# Force-close the position after this many seconds, e.g. 3600
max_holding_time = 300
